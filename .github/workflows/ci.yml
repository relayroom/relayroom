name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # The db/server tests run against a real Postgres. global-setup.ts connects to
    # localhost:48802 (user/password hub) and creates a fresh hub_test database.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: hub
          POSTGRES_PASSWORD: hub
        ports:
          - 48802:5432
        options: >-
          --health-cmd "pg_isready -U hub"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test
      - name: Build publishable CLI
        run: pnpm --filter @relayroom/cli build
