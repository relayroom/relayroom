name: Release images

# Build + push multi-arch GHCR images for a given version, building each arch on its
# OWN native runner (no QEMU emulation): amd64 on ubuntu-latest, arm64 on the free
# public arm64 hosted runner. Each arch is pushed by digest, then a merge step combines
# them into one multi-arch tag (:VERSION + :latest). Manual (workflow_dispatch).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag the images with (e.g. 0.3.3)"
        required: true
        default: "0.3.3"

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # image provenance/attestation
    strategy:
      fail-fast: false
      matrix:
        app: [server, web]
        platform:
          - { arch: amd64, runner: ubuntu-latest }
          - { arch: arm64, runner: ubuntu-24.04-arm }
    env:
      IMAGE: ghcr.io/relayroom/relayroom-${{ matrix.app }}
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/${{ matrix.platform.arch }}
          build-args: |
            RELAYROOM_VERSION=${{ env.VERSION }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digests-${{ matrix.app }}-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [server, web]
    env:
      IMAGE: ghcr.io/relayroom/relayroom-${{ matrix.app }}
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: digests-${{ matrix.app }}-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest
      - name: Create multi-arch manifest from per-arch digests
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)
      - name: Inspect
        run: docker buildx imagetools inspect "${IMAGE}:${VERSION}"
