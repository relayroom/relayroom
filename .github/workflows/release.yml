name: Release (npm)

# Publish the npm packages (@relayroom/cli, @relayroom/install) at their current
# versions via Changesets, with provenance over OIDC trusted publishing.
#
# Manual only: run it from the Actions tab after bumping versions and tagging a
# release. It does NOT run on every push, so normal pushes only run CI.
# Docker images are published separately by release-images.yml (multi-arch).

on:
  workflow_dispatch:

concurrency:
  group: release-npm
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    # Protected environment: manual approval + the npm trusted-publisher binding
    # (repo + workflow + environment) is configured against this environment.
    environment: release
    permissions:
      contents: write # changesets may push a version commit / tags
      pull-requests: write # changesets may open a "Version Packages" PR
      id-token: write # OIDC for npm provenance / trusted publishing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Publish to npm
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "ci: version packages"
          title: "ci: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Build-provenance attestation. OIDC trusted publishing needs no token once
          # the package's trusted publisher is set to this repo + workflow + environment.
          NPM_CONFIG_PROVENANCE: "true"
